  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>

    }

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

          try {

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }

    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

 shared context.\" style=\"font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; background:#EDF3FC;\">\n    <div style=\"flex:1; background:#16284A; padding:74px 110px 44px; display:flex; flex-direction:column; justify-content:space-between;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n        <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#7FA6E0;\">Comparison deck<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#6B8FC9;\">June 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:132px; font-weight:600; line-height:0.95; letter-spacing:-0.02em; color:#DCE9FB;\">Apples <span style=\"color:#6B8FC9;\">vs.<\u002Fspan> Oranges<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; background:#EDF3FC; padding:44px 110px 74px; display:flex; flex-direction:column; justify-content:space-between;\">\n      <div style=\"font-size:48px; font-weight:500; line-height:1.25; color:#3B63B5;\">A comparison deck template<\u002Fdiv>\n      <div style=\"display:flex; justify-content:flex-start; align-items:flex-end;\">\n        <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#8AA0C4;\">Your Name<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2 · APPLES — Why compare? ============ -->\n  <section data-label=\"Apples · Why compare?\" data-screen-label=\"02 Apples\" data-speaker-notes=\"The apples side: dark ground, pale text. Each side gets its own visual voice so the audience always knows which option you're talking about.\" style=\"font-family:'Space Grotesk',sans-serif; background:#16284A; color:#DCE9FB; padding:84px 110px 64px; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;\">\n      <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#7FA6E0;\">Apples<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; letter-spacing:0.3em; font-size:24px; color:#5E7BB0;\">02 / 06<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; gap:96px;\">\n      <div style=\"flex:1.25;\">\n        <div style=\"font-size:96px; font-weight:600; letter-spacing:-0.02em; color:#FEFFFE; margin-bottom:56px;\">Why compare?<\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(127,166,224,.28);\">\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9; line-height:1.5;\">01<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#FEFFFE; margin-bottom:8px;\">Two options, one decision<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#9DB6DE;\">Frame the choice up front so every slide ladders back to it.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9; line-height:1.5;\">02<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#FEFFFE; margin-bottom:8px;\">Each side gets its own visual voice<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#9DB6DE;\">A dedicated palette per option keeps the two from blurring together.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9; line-height:1.5;\">03<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#FEFFFE; margin-bottom:8px;\">Contrast keeps the audience oriented<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#9DB6DE;\">People always know which side they're looking at.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:30px;\">\n        <div style=\"background:#20355C; padding:38px 40px; border-radius:4px;\">\n          <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.32em; font-size:24px; color:#7FA6E0; margin-bottom:18px;\">Note<\u002Fdiv>\n          <div style=\"font-size:28px; line-height:1.5; color:#B9CBE8;\">Apple slides use pale text on a solid navy ground. Callouts sit on a desaturated navy-tint panel.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0F1D38; padding:34px 40px; border-radius:4px; font-family:'Space Mono',monospace; font-size:28px; line-height:1.7;\">\n          <div style=\"color:#6B8FC9;\"># choose a variety<\u002Fdiv>\n          <div><span style=\"color:#DCE9FB;\">variety<\u002Fspan> <span style=\"color:#5E7BB0;\">=<\u002Fspan> <span style=\"color:#9FC2F2;\">\"honeycrisp\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.4em; font-size:24px; color:#3E588C; margin-top:40px;\">Apples &amp; Oranges<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3 · ORANGES — Why compare? ============ -->\n  <section data-label=\"Oranges · Why compare?\" data-screen-label=\"03 Oranges\" data-speaker-notes=\"The oranges side mirrors the structure with an inverted palette: navy text on a pale ground. Same layout, different emphasis.\" style=\"font-family:'Space Grotesk',sans-serif; background:#EDF3FC; color:#16284A; padding:84px 110px 64px; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;\">\n      <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#3B63B5;\">Oranges<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; letter-spacing:0.3em; font-size:24px; color:#8AA0C4;\">03 / 06<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; gap:96px;\">\n      <div style=\"flex:1.25;\">\n        <div style=\"font-size:96px; font-weight:600; letter-spacing:-0.02em; color:#16284A; margin-bottom:56px;\">Why compare?<\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(22,40,74,.16);\">\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(22,40,74,.16);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#3B63B5; line-height:1.5;\">01<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#16284A; margin-bottom:8px;\">Mirror structure, inverted palette<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#5E7BB0;\">Navy text on a pale ground sets the second option apart instantly.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(22,40,74,.16);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#3B63B5; line-height:1.5;\">02<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#16284A; margin-bottom:8px;\">Same layout, different emphasis<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#5E7BB0;\">The grid matches the apples side, so the audience compares like for like.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:28px 0; border-bottom:1px solid rgba(22,40,74,.16);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#3B63B5; line-height:1.5;\">03<\u002Fspan><div><div style=\"font-size:40px; font-weight:500; color:#16284A; margin-bottom:8px;\">Easy to scan which side you're on<\u002Fdiv><div style=\"font-size:25px; font-weight:400; line-height:1.45; color:#5E7BB0;\">The palette flip alone signals which option is on screen.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:30px;\">\n        <div style=\"background:#DEE9F8; padding:38px 40px; border-radius:4px;\">\n          <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.32em; font-size:24px; color:#3B63B5; margin-bottom:18px;\">Tip<\u002Fdiv>\n          <div style=\"font-size:28px; line-height:1.5; color:#3E588C;\">Orange slides invert the palette — navy text on a pale ground. Callouts use a desaturated pale panel.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#E2EBF8; padding:34px 40px; border-radius:4px; font-family:'Space Mono',monospace; font-size:28px; line-height:1.7;\">\n          <div style=\"color:#7C97C6;\"># choose a variety<\u002Fdiv>\n          <div><span style=\"color:#16284A;\">variety<\u002Fspan> <span style=\"color:#8AA0C4;\">=<\u002Fspan> <span style=\"color:#3B63B5;\">\"cara_cara\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.4em; font-size:24px; color:#9DB0CE; margin-top:40px;\">Apples &amp; Oranges<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 4 · COMPARISON (mirror split) ============ -->\n  <section data-label=\"Strengths &amp; trade-offs\" data-screen-label=\"04 Comparison\" data-speaker-notes=\"Side by side. Left is apples on the dark ground, right is oranges on the light ground — same rows, so the eye compares straight across.\" style=\"font-family:'Space Grotesk',sans-serif; display:flex;\">\n    <div style=\"flex:1; background:#16284A; padding:88px 80px; color:#DCE9FB;\">\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#7FA6E0; margin-bottom:54px;\">Apples<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.3em; font-size:24px; color:#6B8FC9; margin-bottom:24px;\">Strengths<\u002Fdiv>\n      <div style=\"font-size:46px; font-weight:500; line-height:1.5; margin-bottom:66px;\">Crisp texture<br>Long shelf life<br>Great for baking<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.3em; font-size:24px; color:#6B8FC9; margin-bottom:24px;\">Trade-offs<\u002Fdiv>\n      <div style=\"font-size:46px; font-weight:400; line-height:1.5; color:#9DB6DE;\">Less juice per bite<br>Fewer varieties in season<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1; background:#EDF3FC; padding:88px 80px; color:#16284A; text-align:right;\">\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#3B63B5; margin-bottom:54px;\">Oranges<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.3em; font-size:24px; color:#6B8FC9; margin-bottom:24px;\">Strengths<\u002Fdiv>\n      <div style=\"font-size:46px; font-weight:500; line-height:1.5; margin-bottom:66px;\">High vitamin C<br>Segment-friendly<br>Bright, fresh flavor<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.3em; font-size:24px; color:#6B8FC9; margin-bottom:24px;\">Trade-offs<\u002Fdiv>\n      <div style=\"font-size:46px; font-weight:400; line-height:1.5; color:#5E7BB0;\">Peel can be messy<br>Shorter peak freshness<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(22,40,74,.20); transform:translateX(-50%);\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 5 · NEUTRAL — Banana ground ============ -->\n  <section data-label=\"Neutral ground\" data-screen-label=\"05 Neutral\" data-speaker-notes=\"The neutral 'banana' tone sits outside the pairing — for summaries, agenda, or shared context that takes no side.\" style=\"font-family:'Space Grotesk',sans-serif; background:#C3C9D2; color:#16284A; padding:84px 110px 64px; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;\">\n      <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#5E6671;\">Neutral<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; letter-spacing:0.3em; font-size:24px; color:#6E7682;\">05 / 06<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; gap:96px;\">\n      <div style=\"flex:1.25;\">\n        <div style=\"font-size:96px; font-weight:600; letter-spacing:-0.02em; color:#16284A; margin-bottom:56px;\">Neutral ground<\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(22,40,74,.14);\">\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(22,40,74,.14);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#8AA0C4;\">01<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Use it for content that takes no side<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(22,40,74,.14);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#8AA0C4;\">02<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Readable body on a soft, desaturated ground<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(22,40,74,.14);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#8AA0C4;\">03<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Good for summaries, agenda, or context<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:34px;\">\n        <div style=\"display:flex; gap:18px;\">\n          <div style=\"flex:1; height:108px; border-radius:4px; background:#16284A; display:flex; align-items:flex-end; padding:14px;\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.12em; color:#9FC2F2;\">apples<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1; height:108px; border-radius:4px; background:#EDF3FC; border:1px solid #C6D6EE; display:flex; align-items:flex-end; padding:14px;\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.12em; color:#3B63B5;\">oranges<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1; height:108px; border-radius:4px; background:#AEB5C1; border:1px solid #98A0AE; display:flex; align-items:flex-end; padding:14px;\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.12em; color:#3A424F;\">banana<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FEFFFE; border:1px solid #D2D7DF; padding:38px 40px; border-radius:4px;\">\n          <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.32em; font-size:24px; color:#5E6671; margin-bottom:18px;\">Note<\u002Fdiv>\n          <div style=\"font-size:28px; line-height:1.5; color:#3E588C;\">Neutral slides sit outside the apples / oranges pairing — use them to set up or wrap up the comparison.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.4em; font-size:24px; color:#9DB0CE; margin-top:40px;\">Apples &amp; Oranges<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 6 · SUMMARY (apples themed) ============ -->\n  <section data-label=\"Summary\" data-screen-label=\"06 Summary\" data-speaker-notes=\"Recap the system: two sides pair across the deck, the neutral tone stands apart, and the layout stays put — only the palette flips.\" style=\"font-family:'Space Grotesk',sans-serif; background:#16284A; color:#DCE9FB; padding:84px 110px 64px; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;\">\n      <span style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.42em; font-size:24px; color:#7FA6E0;\">Apples<\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace; letter-spacing:0.3em; font-size:24px; color:#5E7BB0;\">06 / 06<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; gap:96px;\">\n      <div style=\"flex:1.25;\">\n        <div style=\"font-size:96px; font-weight:600; letter-spacing:-0.02em; color:#FEFFFE; margin-bottom:56px;\">Summary<\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(127,166,224,.28);\">\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9;\">01<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Apples and Oranges pair across the two sides<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9;\">02<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Banana is the neutral, side-less tone<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:30px; align-items:baseline; padding:30px 0; border-bottom:1px solid rgba(127,166,224,.28);\"><span style=\"font-family:'Space Mono',monospace; font-size:24px; color:#6B8FC9;\">03<\u002Fspan><span style=\"font-size:46px; font-weight:500;\">Same layout every time — only the palette flips<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:30px;\">\n        <div style=\"background:#20355C; padding:38px 40px; border-radius:4px;\">\n          <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.32em; font-size:24px; color:#7FA6E0; margin-bottom:18px;\">Use it for<\u002Fdiv>\n          <div style=\"font-size:28px; line-height:1.5; color:#B9CBE8;\">Any two-option decision — products, plans, vendors, directions — where contrast helps the room choose.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0F1D38; padding:34px 40px; border-radius:4px; font-family:'Space Mono',monospace; font-size:28px; line-height:1.7;\">\n          <div style=\"color:#6B8FC9;\"># three tones<\u002Fdiv>\n          <div><span style=\"color:#DCE9FB;\">scheme<\u002Fspan> <span style=\"color:#5E7BB0;\">=<\u002Fspan> <span style=\"color:#9FC2F2;\">[apples, oranges, banana]<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:0.4em; font-size:24px; color:#3E588C; margin-top:40px;\">Apples &amp; Oranges<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Apples vs Oranges.dc"}
